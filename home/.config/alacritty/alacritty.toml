[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black   = "#7f7f7f"
red     = "#ff0000"
green   = "#00ff00"
yellow  = "#ffff00"
blue    = "#5c5cff"
magenta = "#ff00ff"
cyan    = "#00ffff"
white   = "#ffffff"

[colors.normal]
black   = "#000000"
red     = "#cd0000"
green   = "#00cd00"
yellow  = "#cdcd00"
blue    = "#0000ee"
magenta = "#cd00cd"
cyan    = "#00cdcd"
white   = "#e5e5e5"

[colors.primary]
background = "#000000"
foreground = "#ffffff"

[font]
size = 9

[font.bold]
family = "Terminus"
style = "regular"

[font.italic]
family = "Terminus"
style = "regular"

[font.normal]
family = "Terminus"
style = "regular"

[window.padding]
x = 6
y = 6
